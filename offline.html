<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Compiler - Offline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #030712;
            color: #d1d5db;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
        }
        svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: #f9fafb;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 24 24">
            <rect width="24" height="24" rx="4" fill="#3b82f6"/>
            <path fill="#FFFFFF" d="M6 5 L9 19 L12 9 L15 19 L18 5 L16 5 L13.5 15 L12 5 L10.5 15 L8 5 Z"/>
        </svg>
        <h1>You are Offline</h1>
        <p>Wiki Compiler is offline-first. While you need a connection to search for new articles, your entire library, archive, and compilations are available right now.</p>
        <p>Please check your connection to sync with Wikipedia.</p>
    </div>

</html>
