<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Compiler - Offline</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #111827;
            color: #d1d5db;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
        }
        svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            color: #f9fafb;
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1rem;
            line-height: 1.5;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
          <rect width="192" height="192" rx="32" fill="#3b82f6"/>
          <path d="M40,52 L64,140 L96,76 L128,140 L152,52 L132,52 L112,112 L96,52 L80,112 L60,52 Z" fill="#FFFFFF"/>
        </svg>
        <h1>You are Offline</h1>
        <p>Wiki Compiler requires an internet connection to fetch new articles, but you can still access your entire workspace, including any articles in your Archive.</p>
        <p>Please check your connection and try again.</p>
    </div>
